version: 2

models:
  - name: int_daily_metrics
    description: >
      One row per cycle (day) combining strain, recovery, and primary sleep metrics.
      Left joins mean a cycle without a scored recovery or sleep still appears
      (fields will be null). Derived columns: recovery_bucket, sleep_quality_label,
      total_sleep_hours.
    columns:
      - name: cycle_id
        description: WHOOP cycle ID (natural key for this model).
        tests:
          - not_null
          - unique
      - name: user_id
        description: WHOOP user ID.
        tests:
          - not_null
      - name: cycle_date
        description: Calendar date of the cycle (UTC).
        tests:
          - not_null
      - name: strain_score
        description: Day strain score (0-21).
      - name: recovery_score
        description: Recovery score (0-100). Null if cycle has no scored recovery.
      - name: resting_heart_rate
        description: Resting heart rate (bpm).
      - name: hrv_rmssd_milli
        description: HRV RMSSD in milliseconds.
      - name: total_sleep_hours
        description: Net sleep hours (in_bed_hours minus awake_hours).
      - name: sleep_performance_pct
        description: WHOOP sleep performance score (0-100).
      - name: recovery_bucket
        description: "Categorical recovery tier: 'peak' (>=67), 'optimal' (34-66), 'poor' (<34)."
      - name: sleep_quality_label
        description: "Categorical sleep label: 'excellent' (>=85), 'good' (70-84), 'fair' (50-69), 'poor' (<50)."
      - name: loaded_at
        description: Pipeline insertion timestamp (from raw_cycles, used as watermark).

  - name: int_run_recovery
    description: >
      One row per Strava run. Joins each run to WHOOP daily metrics for
      the same day (strain context) and the next day (recovery impact).
      Both joins are left joins: runs without WHOOP data still appear.
      Key analytical question answered: "did my recovery go up or down
      after this run?" via the recovery_delta derived column.
    columns:
      - name: run_id
        description: Strava run ID (primary key).
        tests:
          - not_null
          - unique
      - name: run_date
        description: Calendar date of the run.
        tests:
          - not_null
      - name: distance_km
        description: Run distance in kilometers.
      - name: moving_time_min
        description: Moving time in minutes.
      - name: pace_min_per_km
        description: Average pace in minutes per km.
      - name: same_day_strain
        description: WHOOP day strain on the run day (null if no WHOOP data).
      - name: same_day_recovery
        description: WHOOP recovery score on the run day.
      - name: same_day_recovery_bucket
        description: "'peak', 'optimal', or 'poor' on the run day."
      - name: next_day_recovery
        description: WHOOP recovery score the morning after the run.
      - name: next_day_recovery_bucket
        description: "'peak', 'optimal', or 'poor' the morning after."
      - name: suffer_score
        description: Strava suffer score (relative effort). Null if not computed.
      - name: summary_polyline
        description: >
          Encoded Google Polyline representing the GPS route shape. Decode with
          polyline.decode() to get lat/lng pairs for map rendering. Null for
          treadmill/indoor runs with no GPS.
      - name: recovery_delta
        description: >
          next_day_recovery minus same_day_recovery. Positive = recovery improved
          after the run; negative = recovery declined. Null if either day lacks data.
      - name: whoop_workout_id
        description: >
          UUID of the closest WHOOP-tracked running workout on the same day (matched
          by minimum start-time difference). Null if WHOOP has no running activity
          recorded for that day.
      - name: whoop_sport_name
        description: WHOOP sport name for the matched workout (e.g. "Running", "Trail Running").
      - name: whoop_workout_strain
        description: WHOOP workout strain score (0-21) for the matched activity.
      - name: whoop_workout_avg_hr
        description: Average heart rate during the matched WHOOP workout (bpm).
      - name: whoop_workout_max_hr
        description: Peak heart rate during the matched WHOOP workout (bpm).
      - name: whoop_workout_distance_meter
        description: Distance recorded by WHOOP for the matched workout (meters). Often less precise than Strava GPS.
      - name: whoop_high_intensity_min
        description: Minutes in HR zones 3 + 4 + 5 during the matched WHOOP workout (above ~70% max HR).

  - name: int_workout_recovery
    description: >
      One row per WHOOP workout. Joins each workout to the next-day WHOOP recovery
      metrics, answering: "how did this workout affect my recovery the morning after?"
      Left join means workouts with no next-day data still appear (fields null).
      Grain: one row per workout_id.
    columns:
      - name: workout_id
        description: WHOOP workout UUID (primary key).
        tests:
          - not_null
          - unique
      - name: user_id
        description: WHOOP user ID.
        tests:
          - not_null
      - name: workout_date
        description: Calendar date of the workout start (UTC).
        tests:
          - not_null
      - name: sport_name
        description: Human-readable sport name (e.g. "Running", "Cycling").
      - name: strain_score
        description: Workout strain score (0-21).
      - name: avg_heart_rate
        description: Average heart rate during the workout (bpm).
      - name: max_heart_rate
        description: Peak heart rate during the workout (bpm).
      - name: kilojoule
        description: Calories burned in kilojoules.
      - name: pct_recorded
        description: Fraction of the workout with heart rate data (0-1).
      - name: distance_meter
        description: Distance covered in meters (null for non-distance sports).
      - name: altitude_gain_meter
        description: Total elevation gain in meters.
      - name: altitude_change_meter
        description: Net altitude change start to end (meters).
      - name: high_intensity_min
        description: Total minutes in HR zones 3 + 4 + 5 (above ~70% max HR).
      - name: next_day_recovery
        description: WHOOP recovery score the morning after the workout.
      - name: next_day_recovery_bucket
        description: "'peak', 'optimal', or 'poor' the morning after."
      - name: next_day_hrv
        description: HRV RMSSD (ms) the morning after the workout.
      - name: next_day_resting_hr
        description: Resting heart rate (bpm) the morning after.
      - name: next_day_sleep_performance
        description: Sleep performance percentage the night following the workout.
      - name: next_day_sleep_hours
        description: Net sleep hours the night following the workout.
      - name: next_day_sleep_quality
        description: "'excellent', 'good', 'fair', or 'poor' the night following the workout."
