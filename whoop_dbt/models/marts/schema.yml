version: 2

models:
  - name: fct_daily
    description: >
      Incremental fact table with one row per cycle (day). Merges on cycle_id so
      any WHOOP rescore updates the existing row. Re-processes the last 7 days on
      every run to catch late-arriving scores. Includes all strain, recovery, and
      sleep metrics alongside derived buckets and labels.
    columns:
      - name: cycle_id
        description: WHOOP cycle ID (primary key).
        tests:
          - not_null
          - unique
      - name: user_id
        description: WHOOP user ID.
        tests:
          - not_null
      - name: cycle_date
        description: Calendar date of the cycle (UTC).
        tests:
          - not_null
      - name: strain_score
        description: Day strain score (0-21).
      - name: recovery_score
        description: Recovery score (0-100).
      - name: hrv_rmssd_milli
        description: HRV RMSSD in milliseconds.
      - name: total_sleep_hours
        description: Net sleep hours (in_bed minus awake).
      - name: recovery_bucket
        description: "Tier: 'peak', 'optimal', or 'poor'."
      - name: sleep_quality_label
        description: "Tier: 'excellent', 'good', 'fair', or 'poor'."
      - name: dbt_updated_at
        description: Timestamp of the last dbt run that touched this row.

  - name: dim_user
    description: >
      One row per user. Full rebuild on every run. Contains lifetime aggregates
      (averages and peaks) for recovery, strain, sleep, and HRV.
    columns:
      - name: user_id
        description: WHOOP user ID (primary key).
        tests:
          - not_null
          - unique
      - name: total_tracked_days
        description: Number of days with a scored recovery.
      - name: first_tracked_date
        description: Earliest date with a scored recovery.
      - name: latest_tracked_date
        description: Most recent date with a scored recovery.
      - name: avg_recovery_score
        description: Lifetime average recovery score.
      - name: peak_recovery_score
        description: Highest single-day recovery score.
      - name: avg_strain_score
        description: Lifetime average day strain score.
      - name: avg_sleep_hours
        description: Lifetime average net sleep hours per night.
      - name: avg_hrv_rmssd_milli
        description: Lifetime average HRV RMSSD.
      - name: peak_hrv_rmssd_milli
        description: Highest single-night HRV RMSSD.
      - name: dbt_updated_at
        description: Timestamp of the last dbt run.

  - name: fct_runs
    description: >
      Incremental fact table with one row per Strava run. Merges on run_id;
      re-scans last 7 days to pick up late WHOOP scores or Strava edits.
      Contains all run metrics plus same-day WHOOP strain context and
      next-day WHOOP recovery impact.
    columns:
      - name: run_id
        description: Strava run ID (primary key).
        tests:
          - not_null
          - unique
      - name: run_date
        description: Calendar date of the run.
        tests:
          - not_null
      - name: distance_km
        description: Run distance in kilometers.
      - name: pace_min_per_km
        description: Average pace in minutes per km (lower = faster).
      - name: same_day_strain
        description: WHOOP day strain on the run day.
      - name: same_day_recovery_bucket
        description: "'peak', 'optimal', or 'poor' on the run day."
      - name: next_day_recovery
        description: WHOOP recovery score the morning after the run.
      - name: next_day_recovery_bucket
        description: "'peak', 'optimal', or 'poor' the morning after."
      - name: recovery_delta
        description: next_day_recovery minus same_day_recovery.
      - name: dbt_updated_at
        description: Timestamp of the last dbt run that touched this row.

  - name: my_trends
    description: >
      Full rebuild on every run. One row per (cycle_date, user_id). Provides
      pre-aggregated 7-day and 28-day rolling averages for recovery, strain, sleep,
      and HRV. Also includes day-over-day deltas for trend arrows in dashboards.
      Designed for direct consumption by the serve layer.
    columns:
      - name: cycle_date
        description: Calendar date.
        tests:
          - not_null
      - name: user_id
        description: WHOOP user ID.
        tests:
          - not_null
      - name: recovery_score_7d_avg
        description: 7-day rolling average recovery score.
      - name: strain_score_7d_avg
        description: 7-day rolling average day strain.
      - name: sleep_performance_7d_avg
        description: 7-day rolling average sleep performance percentage.
      - name: hrv_7d_avg
        description: 7-day rolling average HRV RMSSD (ms).
      - name: recovery_score_28d_avg
        description: 28-day rolling average recovery score.
      - name: hrv_28d_avg
        description: 28-day rolling average HRV RMSSD (ms).
      - name: recovery_score_dod
        description: Day-over-day change in recovery score.
      - name: strain_score_dod
        description: Day-over-day change in strain score.
      - name: hrv_dod
        description: Day-over-day change in HRV RMSSD (ms).
