name: Daily WHOOP Pipeline

on:
  schedule:
    - cron: "0 6 * * *"  # 06:00 UTC daily (2am ET)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (fetch only, skip BigQuery upload)"
        type: boolean
        default: false

jobs:
  ingest:
    name: Ingest WHOOP data → BigQuery
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run fetch
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          WHOOP_CLIENT_ID: ${{ secrets.WHOOP_CLIENT_ID }}
          WHOOP_CLIENT_SECRET: ${{ secrets.WHOOP_CLIENT_SECRET }}
          WHOOP_ACCESS_TOKEN: ${{ secrets.WHOOP_ACCESS_TOKEN }}
          WHOOP_REFRESH_TOKEN: ${{ secrets.WHOOP_REFRESH_TOKEN }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          python scripts/fetch.py $ARGS

  dbt:
    name: dbt run + test
    runs-on: ubuntu-latest
    needs: ingest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install dbt-bigquery

      - name: Write dbt profiles.yml + service account key
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          mkdir -p ~/.dbt
          python3 - <<'PYEOF'
          import os, json, pathlib
          raw = os.environ["GOOGLE_APPLICATION_CREDENTIALS_JSON"].strip()
          info = json.loads(raw)
          pathlib.Path("/tmp/sa.json").write_text(json.dumps(info))
          print(f"Wrote service account for project: {info.get('project_id')}")
          PYEOF
          cat > ~/.dbt/profiles.yml << 'EOF'
          whoop_dbt:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: service-account
                project: ${{ vars.BQ_PROJECT }}
                dataset: whoop_dbt
                keyfile: /tmp/sa.json
                location: us-central1
                priority: interactive
                threads: 4
                timeout_seconds: 300
          EOF

      - name: dbt deps
        working-directory: whoop_dbt
        run: dbt deps

      - name: dbt seed
        working-directory: whoop_dbt
        run: dbt seed

      - name: dbt snapshot
        working-directory: whoop_dbt
        run: dbt snapshot

      - name: dbt run
        working-directory: whoop_dbt
        run: dbt run

      - name: dbt test
        working-directory: whoop_dbt
        run: dbt test

      - name: Upload dbt artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-artifacts-${{ github.run_id }}
          path: |
            whoop_dbt/target/manifest.json
            whoop_dbt/target/run_results.json
          retention-days: 30
