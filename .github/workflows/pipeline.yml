name: Daily WHOOP Pipeline

on:
  schedule:
    - cron: "0 6 * * *"  # 06:00 UTC daily (2am ET)
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (fetch only, skip BigQuery upload)"
        type: boolean
        default: false

# Allow the dbt job to push runs.json back to main
permissions:
  contents: write

jobs:
  ingest:
    name: Ingest WHOOP data → BigQuery
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run WHOOP fetch
        env:
          PYTHONPATH: .
          BQ_PROJECT: ${{ vars.BQ_PROJECT }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          WHOOP_CLIENT_ID: ${{ secrets.WHOOP_CLIENT_ID }}
          WHOOP_CLIENT_SECRET: ${{ secrets.WHOOP_CLIENT_SECRET }}
          WHOOP_REDIRECT_URI: ${{ secrets.WHOOP_REDIRECT_URI }}
          WHOOP_ACCESS_TOKEN: ${{ secrets.WHOOP_ACCESS_TOKEN }}
          WHOOP_REFRESH_TOKEN: ${{ secrets.WHOOP_REFRESH_TOKEN }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          python scripts/fetch.py $ARGS

      - name: Run Strava fetch (skips if credentials not set)
        continue-on-error: true
        env:
          PYTHONPATH: .
          BQ_PROJECT: ${{ vars.BQ_PROJECT }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
          WHOOP_CLIENT_ID: ${{ secrets.WHOOP_CLIENT_ID }}
          WHOOP_CLIENT_SECRET: ${{ secrets.WHOOP_CLIENT_SECRET }}
          WHOOP_ACCESS_TOKEN: ${{ secrets.WHOOP_ACCESS_TOKEN }}
          WHOOP_REFRESH_TOKEN: ${{ secrets.WHOOP_REFRESH_TOKEN }}
          STRAVA_CLIENT_ID: ${{ secrets.STRAVA_CLIENT_ID }}
          STRAVA_CLIENT_SECRET: ${{ secrets.STRAVA_CLIENT_SECRET }}
          STRAVA_ACCESS_TOKEN: ${{ secrets.STRAVA_ACCESS_TOKEN }}
          STRAVA_REFRESH_TOKEN: ${{ secrets.STRAVA_REFRESH_TOKEN }}
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="--dry-run"
          fi
          python scripts/fetch_strava.py $ARGS

  dbt:
    name: dbt run + test
    runs-on: ubuntu-latest
    needs: ingest
    timeout-minutes: 20
    env:
      DBT_SEND_ANONYMOUS_USAGE_STATS: "false"
      # BQ_PROJECT is read by env_var('BQ_PROJECT') in sources.yml and profiles.yml
      BQ_PROJECT: ${{ vars.BQ_PROJECT }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          dbt --version

      - name: Write dbt profiles.yml + service account key
        env:
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: |
          python3 - <<'PYEOF'
          import os, json, pathlib
          raw = os.environ["GOOGLE_APPLICATION_CREDENTIALS_JSON"].strip()
          info = json.loads(raw)
          pathlib.Path("/tmp/sa.json").write_text(json.dumps(info))
          print(f"Wrote service account for project: {info.get('project_id')}")
          PYEOF
          # Write directly into the project dir so dbt picks up the CI profile
          # (dbt prefers profiles.yml in the working-directory over ~/.dbt/)
          cat > whoop_dbt/profiles.yml << 'EOF'
          whoop_dbt:
            target: ci
            outputs:
              ci:
                type: bigquery
                method: service-account
                project: ${{ vars.BQ_PROJECT }}
                dataset: whoop_dbt
                keyfile: /tmp/sa.json
                location: us-central1
                priority: interactive
                threads: 4
                timeout_seconds: 300
          EOF

      - name: dbt deps
        working-directory: whoop_dbt
        run: dbt deps

      - name: dbt run
        working-directory: whoop_dbt
        run: dbt run

      - name: dbt test
        working-directory: whoop_dbt
        run: dbt test

      - name: dbt source freshness
        working-directory: whoop_dbt
        # Warn loudly but don't block the pipeline; Strava freshness can lag if
        # no new runs have been logged within the warn window.
        continue-on-error: true
        run: dbt source freshness

      - name: Export runs.json for portfolio
        env:
          PYTHONPATH: .
          BQ_PROJECT: ${{ vars.BQ_PROJECT }}
          GOOGLE_APPLICATION_CREDENTIALS_JSON: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS_JSON }}
        run: python scripts/export_runs_json.py

      - name: Commit and push runs.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/runs.json
          if git diff --staged --quiet; then
            echo "runs.json unchanged — nothing to commit"
          else
            git commit -m "chore(data): refresh runs.json [skip ci]"
            git push
          fi

      - name: Upload dbt artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dbt-artifacts-${{ github.run_id }}
          path: |
            whoop_dbt/target/manifest.json
            whoop_dbt/target/run_results.json
            whoop_dbt/target/sources.json
          retention-days: 30
